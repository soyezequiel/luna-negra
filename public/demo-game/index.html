<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luna Negra · Demo</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0a0c10;
        color: #e6e8ec;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 24px;
      }
      h1 { margin: 0; font-size: 22px; }
      .badge {
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid #ffffff22;
      }
      .ok { background: #16a34a22; color: #86efac; border-color: #16a34a55; }
      .bad { background: #dc262622; color: #fca5a5; border-color: #dc262655; }
      .info { background: #38bdf822; color: #7dd3fc; border-color: #38bdf855; }
      .arena {
        position: relative;
        width: min(90vw, 520px);
        height: 360px;
        border: 1px solid #ffffff1a;
        border-radius: 12px;
        background: radial-gradient(circle at 50% 30%, #1e293b, #0b0d12);
        overflow: hidden;
      }
      #moon {
        position: absolute;
        font-size: 40px;
        background: none;
        border: none;
        cursor: pointer;
        transition: transform 0.05s;
      }
      #moon:active { transform: scale(0.85); }
      .hud { display: flex; gap: 24px; font-size: 16px; }
      .hud b { color: #7dd3fc; }
      button.action {
        background: #0ea5e9;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      button.action:disabled { opacity: 0.5; cursor: default; }
      .muted { color: #94a3b8; font-size: 13px; }
      #lobby {
        display: none;
        width: min(90vw, 520px);
        border: 1px solid #ffffff1a;
        border-radius: 12px;
        background: #11141a;
        padding: 14px 16px;
      }
      #lobby h2 { margin: 0 0 8px; font-size: 15px; }
      #roster { list-style: none; margin: 0; padding: 0; font-size: 14px; }
      #roster li {
        padding: 3px 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #roster b { color: #7dd3fc; }
      .av {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        object-fit: cover;
        flex-shrink: 0;
      }
      .av.ph { background: #ffffff1a; }
      .team { margin-top: 8px; font-size: 14px; }
      .team b { color: #86efac; font-size: 18px; }
      #net { font-size: 12px; color: #64748b; margin-top: 6px; }
    </style>
  </head>
  <body>
    <h1>🌑 Atrapá la Luna</h1>
    <div id="status" class="badge info">Verificando acceso…</div>

    <div id="lobby">
      <h2>👥 Sala</h2>
      <ul id="roster"></ul>
      <div class="team">Puntaje del equipo: <b id="team">0</b></div>
      <div id="net">conectando a relays…</div>
    </div>

    <div class="hud">
      <div>Tu puntaje: <b id="score">0</b></div>
      <div>Tiempo: <b id="time">15</b>s</div>
    </div>

    <div class="arena" id="arena">
      <button id="moon" style="display: none">🌙</button>
    </div>

    <button class="action" id="start">Empezar</button>
    <p class="muted">
      Juego demo de Luna Negra · API v1 (Bearer): entitlement vía
      <code>/api/v1/entitlements/verify</code> · sala vía
      <code>/api/v1/rooms/verify</code> + <code>/api/v1/rooms/:id/presence</code>
    </p>

    <script>
      const params = new URLSearchParams(location.search);
      const entToken = params.get("lnToken"); // acceso single-player
      const inviteToken = params.get("inviteToken"); // multijugador
      const room = params.get("room");
      const statusEl = document.getElementById("status");

      function setStatus(kind, text) {
        statusEl.className = "badge " + kind;
        statusEl.textContent = text;
      }

      // --- Presencia "Jugando" en Luna Negra (heartbeat al opener) ---
      // El estado NIP-38 lo firma la tienda (nuestro opener) con la llave Nostr
      // del jugador; nosotros sólo le avisamos "sigo vivo" cada ~10s. Si dejamos
      // de latir más de 20s (cerramos la pestaña, se cae el navegador), la tienda
      // baja la presencia. Así no quedamos "Jugando" colgados. No-op si el juego
      // se abrió sin opener (acceso directo, fuera de Luna Negra).
      (function () {
        if (!window.opener) return;
        const ping = (type) => {
          try {
            window.opener.postMessage({ type }, "*");
          } catch {}
        };
        ping("lunanegra:heartbeat");
        const hb = setInterval(() => ping("lunanegra:heartbeat"), 10000);
        window.addEventListener("beforeunload", () => {
          clearInterval(hb);
          ping("lunanegra:stopped");
        });
      })();

      // --- Estado multijugador (presencia por polling al backend) ---
      // Cada pestaña/navegador tiene un clientId propio, así dos personas
      // (o dos sesiones) se distinguen aunque compartan npub.
      const clientId = Math.random().toString(36).slice(2, 10);
      let me = null; // { npub, host, roomId }
      let lastMembers = []; // roster del backend (incluye nombre/avatar cacheados)
      let pollTimer = null;
      const lobbyEl = document.getElementById("lobby");
      const rosterEl = document.getElementById("roster");
      const teamEl = document.getElementById("team");
      const netEl = document.getElementById("net");

      const shortNpub = (n) => (n ? n.slice(0, 12) + "…" : "anónimo");
      // Escapar HTML (el nombre/avatar vienen de perfiles de usuario).
      const esc = (s) =>
        String(s == null ? "" : s).replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );

      function avatarHtml(url) {
        if (typeof url === "string" && /^https?:\/\//.test(url)) {
          // referrerpolicy=no-referrer: muchos hosts de avatares bloquean el
          // hotlink con referer. onerror: si igual falla, mostrar el placeholder.
          return (
            '<img class="av" src="' +
            esc(url) +
            '" alt="" referrerpolicy="no-referrer" ' +
            "onerror=\"this.replaceWith(Object.assign(document.createElement('span'),{className:'av ph'}))\" />"
          );
        }
        return '<span class="av ph"></span>';
      }

      function renderRoster() {
        // Usar el roster del backend (con nombre/avatar); para mí, puntaje local.
        const rows = lastMembers.length
          ? lastMembers.map((m) => ({
              npub: m.npub,
              name: m.name,
              avatar: m.avatar,
              host: m.host,
              score: m.clientId === clientId ? score : m.score,
              you: m.clientId === clientId,
            }))
          : me
            ? [{ npub: me.npub, name: null, avatar: null, host: me.host, score, you: true }]
            : [];
        rosterEl.innerHTML = rows
          .map(
            (p) =>
              '<li>' +
              avatarHtml(p.avatar) +
              "<span>" +
              (p.host ? "👑 " : "") +
              esc(p.name || shortNpub(p.npub)) +
              (p.you ? " (vos)" : "") +
              " — <b>" +
              (p.score || 0) +
              "</b></span></li>",
          )
          .join("");
        teamEl.textContent = rows.reduce((s, p) => s + (p.score || 0), 0);
      }

      // Latido: postea mi puntaje y recibe el roster de la sala.
      async function heartbeat(leave) {
        if (!me) return;
        try {
          const r = await fetch(
            "/api/v1/rooms/" + encodeURIComponent(me.roomId) + "/presence",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + inviteToken,
              },
              keepalive: !!leave,
              body: JSON.stringify({ clientId, score, leave: !!leave }),
            },
          );
          const d = await r.json();
          // El host cerró el juego → la sala se cerró: echar a este invitado.
          if (d.closed) {
            roomClosed();
            return;
          }
          if (Array.isArray(d.members)) {
            lastMembers = d.members;
            netEl.textContent =
              "🛰️ conectado · sala " + me.roomId + " · " + d.members.length + " en línea";
            renderRoster();
          }
        } catch {
          netEl.textContent = "⚠️ reintentando conexión…";
        }
      }

      // La sala se cerró (el host cerró el juego): frenar todo y avisar.
      function roomClosed() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
        me = null; // corta futuros latidos
        playing = false;
        clearInterval(timer);
        moon.style.display = "none";
        startBtn.disabled = true;
        netEl.textContent = "🚪 el host cerró la sala";
        setStatus("bad", "El host cerró la sala");
      }

      async function setupLobby() {
        lobbyEl.style.display = "block";
        renderRoster();
        await heartbeat(false);
        pollTimer = setInterval(() => heartbeat(false), 2000);
        window.addEventListener("beforeunload", () => heartbeat(true));
      }

      async function verifyAccess() {
        // Multijugador: validar la invitación y armar el lobby.
        if (inviteToken && room) {
          try {
            const r = await fetch("/api/v1/rooms/verify", {
              headers: { Authorization: "Bearer " + inviteToken },
            });
            const d = await r.json();
            if (d.valid) {
              me = { npub: d.npub, host: d.host, roomId: d.roomId || room };
              setStatus(
                "ok",
                (d.host ? "👑 Sos el host · " : "Entraste a la sala · ") +
                  d.npub.slice(0, 16) +
                  "…",
              );
              setupLobby();
            } else {
              setStatus("bad", "Invitación inválida o expirada");
            }
          } catch {
            setStatus("bad", "No se pudo verificar la invitación");
          }
          return;
        }
        // Single-player: entitlement.
        if (entToken) {
          try {
            const r = await fetch("/api/v1/entitlements/verify", {
              headers: { Authorization: "Bearer " + entToken },
            });
            const d = await r.json();
            if (d.valid) {
              setStatus("ok", "Acceso verificado · " + d.npub.slice(0, 16) + "…");
            } else {
              setStatus("bad", "Token inválido o expirado");
            }
          } catch {
            setStatus("bad", "No se pudo verificar el acceso");
          }
          return;
        }
        setStatus("info", "Modo invitado (sin token de Luna Negra)");
      }
      verifyAccess();

      // --- Juego ---
      const arena = document.getElementById("arena");
      const moon = document.getElementById("moon");
      const scoreEl = document.getElementById("score");
      const timeEl = document.getElementById("time");
      const startBtn = document.getElementById("start");

      let score = 0,
        time = 15,
        timer = null,
        playing = false;

      // Empuja el puntaje al backend enseguida (con throttle), sin esperar al
      // poll de 2s, para que el equipo lo vea casi en vivo.
      let pushTimer = null;
      function pushScore() {
        if (pushTimer) return;
        pushTimer = setTimeout(() => {
          pushTimer = null;
          heartbeat(false);
        }, 600);
      }

      function moveMoon() {
        const x = Math.random() * (arena.clientWidth - 50);
        const y = Math.random() * (arena.clientHeight - 50);
        moon.style.left = x + "px";
        moon.style.top = y + "px";
      }

      moon.addEventListener("click", () => {
        if (!playing) return;
        score++;
        scoreEl.textContent = score;
        moveMoon();
        pushScore();
        renderRoster();
      });

      function endGame() {
        playing = false;
        clearInterval(timer);
        moon.style.display = "none";
        startBtn.disabled = false;
        startBtn.textContent = "Jugar de nuevo";
        setStatus("info", "¡Terminó! Tu puntaje: " + score);
        if (me) heartbeat(false);
      }

      startBtn.addEventListener("click", () => {
        score = 0;
        time = 15;
        playing = true;
        scoreEl.textContent = "0";
        timeEl.textContent = "15";
        startBtn.disabled = true;
        moon.style.display = "block";
        moveMoon();
        if (me) heartbeat(false);
        renderRoster();
        timer = setInterval(() => {
          time--;
          timeEl.textContent = time;
          if (time <= 0) endGame();
        }, 1000);
      });
    </script>
  </body>
</html>
