<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luna Negra · Demo</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0a0c10;
        color: #e6e8ec;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 24px;
      }
      h1 { margin: 0; font-size: 22px; }
      .badge {
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid #ffffff22;
      }
      .ok { background: #16a34a22; color: #86efac; border-color: #16a34a55; }
      .bad { background: #dc262622; color: #fca5a5; border-color: #dc262655; }
      .info { background: #38bdf822; color: #7dd3fc; border-color: #38bdf855; }
      .arena {
        position: relative;
        width: min(90vw, 520px);
        height: 360px;
        border: 1px solid #ffffff1a;
        border-radius: 12px;
        background: radial-gradient(circle at 50% 30%, #1e293b, #0b0d12);
        overflow: hidden;
      }
      #moon {
        position: absolute;
        font-size: 40px;
        background: none;
        border: none;
        cursor: pointer;
        transition: transform 0.05s;
      }
      #moon:active { transform: scale(0.85); }
      .hud { display: flex; gap: 24px; font-size: 16px; }
      .hud b { color: #7dd3fc; }
      button.action {
        background: #0ea5e9;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      button.action:disabled { opacity: 0.5; cursor: default; }
      .muted { color: #94a3b8; font-size: 13px; }
      #lobby {
        display: none;
        width: min(90vw, 520px);
        border: 1px solid #ffffff1a;
        border-radius: 12px;
        background: #11141a;
        padding: 14px 16px;
      }
      #lobby h2 { margin: 0 0 8px; font-size: 15px; }
      #roster { list-style: none; margin: 0; padding: 0; font-size: 14px; }
      #roster li { padding: 3px 0; }
      #roster b { color: #7dd3fc; }
      .team { margin-top: 8px; font-size: 14px; }
      .team b { color: #86efac; font-size: 18px; }
      #net { font-size: 12px; color: #64748b; margin-top: 6px; }
    </style>
  </head>
  <body>
    <h1>🌑 Atrapá la Luna</h1>
    <div id="status" class="badge info">Verificando acceso…</div>

    <div id="lobby">
      <h2>👥 Sala</h2>
      <ul id="roster"></ul>
      <div class="team">Puntaje del equipo: <b id="team">0</b></div>
      <div id="net">conectando a relays…</div>
    </div>

    <div class="hud">
      <div>Tu puntaje: <b id="score">0</b></div>
      <div>Tiempo: <b id="time">15</b>s</div>
    </div>

    <div class="arena" id="arena">
      <button id="moon" style="display: none">🌙</button>
    </div>

    <button class="action" id="start">Empezar</button>
    <p class="muted">
      Juego demo de Luna Negra · entitlement vía
      <code>/api/entitlements/verify</code> · sala vía
      <code>/api/rooms/verify</code> + presencia <code>/api/rooms/:id/presence</code>
    </p>

    <script>
      const params = new URLSearchParams(location.search);
      const entToken = params.get("lnToken"); // acceso single-player
      const inviteToken = params.get("inviteToken"); // multijugador
      const room = params.get("room");
      const statusEl = document.getElementById("status");

      function setStatus(kind, text) {
        statusEl.className = "badge " + kind;
        statusEl.textContent = text;
      }

      // --- Estado multijugador (presencia por polling al backend) ---
      // Cada pestaña/navegador tiene un clientId propio, así dos personas
      // (o dos sesiones) se distinguen aunque compartan npub.
      const clientId = Math.random().toString(36).slice(2, 10);
      let me = null; // { npub, host, roomId }
      let peers = []; // [{ clientId, npub, host, score }] (otros, del backend)
      let pollTimer = null;
      const lobbyEl = document.getElementById("lobby");
      const rosterEl = document.getElementById("roster");
      const teamEl = document.getElementById("team");
      const netEl = document.getElementById("net");

      const shortNpub = (n) => (n ? n.slice(0, 12) + "…" : "anónimo");

      function renderRoster() {
        const all = [];
        if (me) all.push({ npub: me.npub, host: me.host, score, you: true });
        for (const p of peers)
          all.push({ npub: p.npub, host: p.host, score: p.score, you: false });
        rosterEl.innerHTML = all
          .map(
            (p) =>
              "<li>" +
              (p.host ? "👑 " : "") +
              shortNpub(p.npub) +
              (p.you ? " (vos)" : "") +
              " — <b>" +
              (p.score || 0) +
              "</b></li>",
          )
          .join("");
        teamEl.textContent = all.reduce((s, p) => s + (p.score || 0), 0);
      }

      // Latido: postea mi puntaje y recibe el roster de la sala.
      async function heartbeat(leave) {
        if (!me) return;
        try {
          const r = await fetch(
            "/api/rooms/" + encodeURIComponent(me.roomId) + "/presence",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              keepalive: !!leave,
              body: JSON.stringify({ inviteToken, clientId, score, leave: !!leave }),
            },
          );
          const d = await r.json();
          if (Array.isArray(d.members)) {
            peers = d.members.filter((m) => m.clientId !== clientId);
            netEl.textContent =
              "🛰️ conectado · sala " + me.roomId + " · " + d.members.length + " en línea";
            renderRoster();
          }
        } catch {
          netEl.textContent = "⚠️ reintentando conexión…";
        }
      }

      async function setupLobby() {
        lobbyEl.style.display = "block";
        renderRoster();
        await heartbeat(false);
        pollTimer = setInterval(() => heartbeat(false), 2000);
        window.addEventListener("beforeunload", () => heartbeat(true));
      }

      async function verifyAccess() {
        // Multijugador: validar la invitación y armar el lobby.
        if (inviteToken && room) {
          try {
            const r = await fetch(
              "/api/rooms/verify?token=" + encodeURIComponent(inviteToken),
            );
            const d = await r.json();
            if (d.valid) {
              me = { npub: d.npub, host: d.host, roomId: d.roomId || room };
              setStatus(
                "ok",
                (d.host ? "👑 Sos el host · " : "Entraste a la sala · ") +
                  d.npub.slice(0, 16) +
                  "…",
              );
              setupLobby();
            } else {
              setStatus("bad", "Invitación inválida o expirada");
            }
          } catch {
            setStatus("bad", "No se pudo verificar la invitación");
          }
          return;
        }
        // Single-player: entitlement.
        if (entToken) {
          try {
            const r = await fetch(
              "/api/entitlements/verify?token=" + encodeURIComponent(entToken),
            );
            const d = await r.json();
            if (d.valid) {
              setStatus("ok", "Acceso verificado · " + d.npub.slice(0, 16) + "…");
            } else {
              setStatus("bad", "Token inválido o expirado");
            }
          } catch {
            setStatus("bad", "No se pudo verificar el acceso");
          }
          return;
        }
        setStatus("info", "Modo invitado (sin token de Luna Negra)");
      }
      verifyAccess();

      // --- Juego ---
      const arena = document.getElementById("arena");
      const moon = document.getElementById("moon");
      const scoreEl = document.getElementById("score");
      const timeEl = document.getElementById("time");
      const startBtn = document.getElementById("start");

      let score = 0,
        time = 15,
        timer = null,
        playing = false;

      // Empuja el puntaje al backend enseguida (con throttle), sin esperar al
      // poll de 2s, para que el equipo lo vea casi en vivo.
      let pushTimer = null;
      function pushScore() {
        if (pushTimer) return;
        pushTimer = setTimeout(() => {
          pushTimer = null;
          heartbeat(false);
        }, 600);
      }

      function moveMoon() {
        const x = Math.random() * (arena.clientWidth - 50);
        const y = Math.random() * (arena.clientHeight - 50);
        moon.style.left = x + "px";
        moon.style.top = y + "px";
      }

      moon.addEventListener("click", () => {
        if (!playing) return;
        score++;
        scoreEl.textContent = score;
        moveMoon();
        pushScore();
        renderRoster();
      });

      function endGame() {
        playing = false;
        clearInterval(timer);
        moon.style.display = "none";
        startBtn.disabled = false;
        startBtn.textContent = "Jugar de nuevo";
        setStatus("info", "¡Terminó! Tu puntaje: " + score);
        if (me) heartbeat(false);
      }

      startBtn.addEventListener("click", () => {
        score = 0;
        time = 15;
        playing = true;
        scoreEl.textContent = "0";
        timeEl.textContent = "15";
        startBtn.disabled = true;
        moon.style.display = "block";
        moveMoon();
        if (me) heartbeat(false);
        renderRoster();
        timer = setInterval(() => {
          time--;
          timeEl.textContent = time;
          if (time <= 0) endGame();
        }, 1000);
      });
    </script>
  </body>
</html>
